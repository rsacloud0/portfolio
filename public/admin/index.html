<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Decap CMS Admin</title>
  <!-- Load Decap CMS from CDN -->
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
</head>
<body>
  <div id="loading">Loading Admin...</div>
  
  <script>
    // Explicitly initialize with GitHub backend to prevent fallback to Git Gateway
    CMS.init({
      backend: {
        name: 'github',
        repo: 'rsacloud0/portfolio',
        branch: 'main',
        auth_endpoint: 'https://decap-cms-oauth-plum.vercel.app/api/auth'
      }
    });
  </script>
</body>
</html>
