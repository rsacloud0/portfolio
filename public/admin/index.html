<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Content Manager</title>
  <style>
    body { margin: 0; background: #080812; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  </style>
</head>
<body>
  <script>
    CMS_MANUAL_INIT = true
  </script>
  <script src="https://unpkg.com/decap-cms@^3/dist/decap-cms.js"></script>
  <script>
    var CONFIG = {
      load_config_file: false,
      backend: {
        name: "github",
        repo: "rsacloud0/portfolio",
        branch: "main",
        base_url: window.location.origin,
        auth_endpoint: "api/auth",
        squash_merges: true,
      },
      media_folder: "public/images",
      public_folder: "/images",
      slug: { encoding: "ascii", clean_accents: true },
      collections: [
        {
          name: "blog",
          label: "Blog Posts",
          label_singular: "Post",
          folder: "src/content/blog",
          create: true,
          delete: true,
          sortable_fields: ["date", "title"],
          default_sort: "date",
          extension: "mdx",
          format: "frontmatter",
          slug: "{{slug}}",
          fields: [
            { name: "title", label: "Title", widget: "string" },
            { name: "date", label: "Date", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false, picker_utc: true },
            { name: "description", label: "Description", widget: "text" },
            { name: "tags", label: "Tags", widget: "list", default: [], required: false },
            { label: "Body", name: "body", widget: "markdown", minimal: true, buttons: ["bold", "italic", "code", "link", "heading-three", "quote", "bulleted-list", "numbered-list"] },
          ],
        },
        {
          name: "projects",
          label: "Projects",
          label_singular: "Project",
          folder: "src/content/projects",
          create: true,
          delete: true,
          extension: "mdx",
          format: "frontmatter",
          slug: "{{slug}}",
          fields: [
            { name: "title", label: "Title", widget: "string" },
            { name: "description", label: "Description", widget: "text" },
            { name: "tech", label: "Technologies", widget: "list", default: [] },
            { name: "github", label: "GitHub URL", widget: "string", required: false },
            { name: "live", label: "Live URL", widget: "string", required: false },
          ],
        },
      ],
    }

    function initCMS(token) {
      CONFIG.backend.token = token
      CMS.init({ config: CONFIG })
    }

    function getTokenFromCookie() {
      var match = document.cookie.match(/(?:^|;\s*)decap_cms_token=([^;]*)/)
      return match ? decodeURIComponent(match[1]) : null
    }

    // Store cookie token in localStorage so Decap CMS can use it
    var token = getTokenFromCookie()
    if (token) {
      try {
        localStorage.setItem('decap-cms-auth', JSON.stringify({ access_token: token }))
      } catch(e) {}
      document.cookie = 'decap_cms_token=; path=/; max-age=0'  // clear cookie
    }

    var stored = localStorage.getItem('decap-cms-auth')
    if (stored) {
      try {
        var data = JSON.parse(stored)
        if (data.access_token) {
          initCMS(data.access_token)
        }
      } catch(e) {}
    } else {
      document.body.innerHTML = [
        '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:20px;color:#e2e8f0">',
        '<h1 style="font-size:24px;font-weight:600;margin:0">Content Manager</h1>',
        '<p style="color:#94a3b8;margin:0">Log in with GitHub to manage your content.</p>',
        '<a href="/api/auth" style="padding:12px 32px;background:#818cf8;color:white;border:none;border-radius:8px;font-size:15px;cursor:pointer;text-decoration:none">Login with GitHub</a>',
        '</div>'
      ].join('')
    }
  </script>
</body>
</html>
